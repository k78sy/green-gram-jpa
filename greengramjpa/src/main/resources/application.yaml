constants:   # 커스텀 속성
  jwt:
    issuer: green502@green.com # JWT 토큰 발행자 정보
    bearer-format: JWT
    claim-key: signedUser
    secret-key: DeaguGreenArtAcademyClass502MsaClassFighting # 비밀 레시피(절대 공개되어서는 안 된다)
    access-token-cookie-name: access-token
    access-token-cookie-path: / # 항상 무조건 쿠키 사용
    access-token-cookie-validity-seconds: 900 # 15분
    access-token-validity-milliseconds: 900_000 # 15분
    refresh-token-cookie-name: refresh-token
    refresh-token-cookie-path: /api/user/reissue # 이 주소 일때만 쿠키 사용
    refresh-token-cookie-validity-seconds: 1_296_000 # 15일
    refresh-token-validity-milliseconds: 1_296_000_000 # 15일
  file:
    directory: C:/Users/user/Documents/coding/gramjpa/pic

spring:
  application:
    name: greengramjpa
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/greengram_jpa
    username: root
    password: fkqlzjxj7831!
  jpa:
    database: mysql
    hibernate:
      ddl-auto: update # 데이터 정의어 - CREATE, ALTER, DROP (update:없으면 만들고, 있으면 수정) (create:항상 새로 만듬)
    properties:
      hibernate:
        jdbc:
          batch_size: 50 # 데이터가 50개 정도 쌓이면 보낸다는 의미
        format_sql: true # SQL문을 보기좋게 포맷을 할거냐
        order_update: true # 배치 작업 활성화
    show_sql: true # JPA가 쿼리문 로그에 출력

mybatis: # Mybatis 세팅
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: mappers/**/*.xml # xml 파일 위치
